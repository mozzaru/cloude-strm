name: Pull Request Check

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.jpg"
      - "**/*.png"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 23

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew make --stacktrace
