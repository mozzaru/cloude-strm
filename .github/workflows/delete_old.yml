name: Delete old build attempts
on:
  workflow_dispatch:

jobs:
  del_runs:
    runs-on: ubuntu-latest
    # FIX: Menambahkan izin 'write' agar bot bisa menghapus run
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          # Opsional: Jika ingin spesifik menghapus SEMUA jenis status (Sukses, Gagal, Dibatalkan)
          delete_run_by_conclusion_pattern: "success,failure,skipped,cancelled"